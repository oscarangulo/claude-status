name: Feature Request
description: Suggest an idea for claude-status
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case
      placeholder: "I want to know how much each subagent costs because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
      placeholder: "Show a breakdown per subagent in the status line..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Status line display
        - TUI dashboard
        - Cost analysis / tips
        - Installation / setup
        - New command
        - Other
    validations:
      required: true
